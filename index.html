<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta name="google-site-verification" content="hvRHtmgU9VlKoN5RfrEjprCjDkAM-xC4TpPvGaWbljo" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>棠想視界 KIKI DESIGN | Create with Soul - 視覺設計與品牌規劃</title>

  <!-- SEO 核心描述設定 -->
  <meta name="description" content="KIKI DESIGN 致力於創造富有靈魂的視覺體驗。專注於視覺設計、品牌識別規劃及數位影像創作，Available for collaborations 2026。透過細膩的排版與色彩，為每個品牌打造獨一無二的敘事風格。">
  <meta name="keywords" content="KIKI DESIGN, 視覺設計, 品牌設計, 平面設計, 網頁設計, Visual Design, Branding, Taiwan Designer">

  <!-- OpenGraph 基礎分享資料 -->
  <meta property="og:title" content="KIKI DESIGN | Create with Soul">
  <meta property="og:description" content="創造富有靈魂的視覺體驗。視覺設計、品牌識別規劃及數位影像創作，Available for collaborations 2026。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="KIKI DESIGN">
  <meta property="og:url" content="https://kiki-design.vercel.app/">
  <meta property="og:image" content="https://kiki-design.vercel.app/og-image.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter 分享卡片資訊 -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="KIKI DESIGN | Create with Soul">
  <meta name="twitter:description" content="視覺設計、品牌識別規劃及數位影像創作。">
  
  <!-- ===== 圖標與 PWA 設定區（集中統整，避免重覆） ===== -->
  <!-- 主要 SVG Favicon -->
  <link rel="icon" type="image/svg+xml" href="logo-kiki-main.svg" />
  <!-- 多尺寸 PNG Favicon -->
  <link rel="icon" type="image/png" sizes="48x48"   href="favicon-48x48.png">
  <link rel="icon" type="image/png" sizes="32x32"   href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16"   href="favicon-16x16.png">
  <!-- Apple 裝置專用 -->
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <!-- Manifest 與 fallback icon -->
  <link rel="manifest" href="site.webmanifest">
  <link rel="shortcut icon" href="favicon.ico">

  <!-- ===== 字型資源統一管理（非同步載入，完全解除渲染阻塞） ===== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- 非同步動態注入字體：確保不阻塞 loader/首次 render -->
  <script>
    // 透過 JS 非同步注入，讓 Loader 與首屏完全不等待 Google Fonts
    window.addEventListener('DOMContentLoaded', function() {
      var fontLink = document.createElement('link');
      fontLink.rel = 'stylesheet';
      fontLink.href = 'https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100;300;400&family=Playfair+Display:ital,wght@1,400&display=swap';
      fontLink.media = 'all';
      document.head.appendChild(fontLink);
    });
  </script>

  <!-- ===== 主要樣式由 Vite 統一透過 index.tsx import 管理，此處不重複載入 ===== -->

  <!-- ===== GSAP 動畫主程式與插件（全部強制用 defer，嚴禁阻塞頁面解析） ===== -->
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>

  <!-- ===== React 與 Router ImportMap（集中定義） ===== -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react/": "https://esm.sh/react@18.3.1/",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/": "https://esm.sh/react-dom@18.3.1/",
        "react-router-dom": "https://esm.sh/react-router-dom@6.22.3?external=react,react-dom"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="index.tsx"></script>
</body>
</html>
