  <!-- 確保 Hero 區塊的主圖在頁面解析之初就開始下載，縮短使用者看到核心視覺的等待時間 -->
  <link rel="preload" as="image" href="/src/assets/images/branding-mockup-main.webp" fetchpriority="high">

  <!-- 字型：預連線後再以非阻塞方式注入，避免卡住首屏 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      var fontLink = document.createElement('link');
      fontLink.rel = 'stylesheet';
      fontLink.href = 'https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100;300;400&family=Playfair+Display:ital,wght@1,400&display=swap';
      fontLink.media = 'all';
      document.head.appendChild(fontLink);
    });
  </script>

  <!-- 主要樣式由 Vite（index.tsx）匯入，此處不重複載入 -->

  <!-- GSAP：defer 不阻塞 HTML 解析；執行順序仍為載入順序 -->

  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
